<!DOCTYPE html>
<html>

<head>
  <link rel="stylesheet" href="popup.css">
  <link rel="stylesheet" href="/css/root.css">

<body>
  <div class="version">
    BL <span id="version"></span>
  </div>
  <unverified id="unverified">unverified</unverified>
  <!-- <div class="nav">
            <img src="/icon128.png">
        </div> -->
  <img id="logo" class="logo" src="/icon128.png">
  <img id="logo-detector" class="logo" src="/icon128.png">
  <div id="contents" class="view">
    <h1 style="margin: 0; line-height: 23px;" id="listtitle"> Friends List:</h1>
    <info>
      <!-- [You'll only see projects from Scratchers listed below] -->
      Allow collaborating with friends:
    </info>

    <conta>
      <input id="add" placeholder="add username">

      </input>
      <button id="submit">+</button>

    </conta>
    <ul id="friends" class="friends">
      Loading...
    </ul>
    <button class="viewall" id="projects">View Projects</button>

    <div
      style="display: flex; flex-direction: row; align-items: center; justify-self: center; justify-content: center;">
      <span style="font-weight: bold;">Project Chat:</span>
      <div style="width: 5px;"></div>
      <input type="checkbox" id="notifs">
      <label for="notifs" style="font-weight: normal;">Notifications</label>
      <div style="width: 5px;"></div>
      <input type="checkbox" id="ping-sounds">
      <label for="ping" style="font-weight: normal;">Ping Sound</label>
    </div>

    <div
      style="display: flex; flex-direction: row; align-items: center; justify-self: center; justify-content: center;">
      <span style="font-weight: bold;">Badges</span>
      <div style="width: 5px;"></div>
      <!-- <input type="checkbox" id="notifs"> -->
      <div class="container">
        <label class="switch">
          <input type="checkbox" id="badges">
          <span class="slider round"></span>
        </label>
      </div>

      <!-- <label for="notifs" style="font-weight: normal;">Enabled</label> -->
      <div style="width: 5px;"></div>
      <input type="checkbox" id="privme" style="accent-color: red;">
      <label for="privme" style="font-weight: normal;">Hide that I use blocklive</label>
      <!-- <label for="ping" style="font-weight: normal;">Hide me to others</label> -->
    </div>

    <section class="hidden">
      <div class="flex-horiz">
        <span>Custom Server:</span>
      </div>
      <div class="flex-horiz">
        <div style="display: flex; flex-direction: row; align-items: center; justify-content: center;">
          <input type="checkbox" id="custom-server" />
          <input type="url" id="server-url" placeholder="Custom Server URL" disabled />
        </div>
      </div>
    </section>
    <!-- <br> -->
    <!-- <br> -->
    <!-- <span>Blocklive is by <a href="#" id="ilhp10" href="https://scratch.mit.edu/users/ilhp10">ilhp10</a>, with some features by <a href="#" id="rgantzos" href="https://scratch.mit.edu/users/rgantzos">rgantzos</a></span> -->

          <img class="creator_img" src="https://cdn2.scratch.mit.edu/get_image/user/128606483_60x60.png">

          <span class="credit-name">Waakul</span>

        </div>

      </div>

    </div>



    <!-- <br> -->
    <!-- <br> -->
    <div style="display:flex;flex-direction: row; gap:10px; align-items: center; justify-content: center;">
      <a id="link-discord" class="link" style="display: flex; align-self: center;" href="#"><img width="20" height="20"
          style="margin-right: 3px"
          src='https://assets-global.website-files.com/6257adef93867e50d84d30e2/636e0a69f118df70ad7828d4_icon_clyde_blurple_RGB.svg' />Discord</a>
